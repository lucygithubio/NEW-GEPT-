<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 單字冒險 - 勇者傳說修復版</title>
    <style>
        /* =========================================
           CSS 樣式：極致黑金 RPG 遊戲介面
           ========================================= */
        :root {
            --bg-deep: #050a14;
            --bg-surface: #0a192f;
            --gold-main: #d4af37;
            --gold-bright: #f9e272;
            --text-light: #e6f1ff;
            --text-dim: #8892b0;
            --accent-blue: #4A90E2;
            --accent-success: #2ecc71;
            --accent-fail: #ff4b2b;
            --shadow: 0 10px 40px rgba(0,0,0,0.7);
            --overlay-bg: rgba(5, 10, 20, 0.98);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 80%),
                linear-gradient(to bottom, #050a14, #0a192f);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-y: auto;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10000;
        }

        .screen { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        .screen.active { display: flex; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 0. 彈出對話框系統 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); z-index: 9000;
            display: flex; justify-content: center; align-items: center;
            text-align: center; backdrop-filter: blur(10px);
            transition: opacity 0.4s;
        }

        .modal-content {
            background: rgba(10, 25, 47, 0.95);
            border: 3px solid var(--gold-main);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
            max-width: 480px; width: 90%;
            position: relative;
        }

        /* 1. 角色英雄卡片 */
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 30px; }
        .char-card {
            background: linear-gradient(145deg, #112240, #0a192f);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s;
            text-align: center; box-shadow: var(--shadow);
            opacity: 0.7;
        }
        .char-card:hover { border-color: var(--gold-main); opacity: 1; transform: translateY(-5px); }
        .char-card.selected { 
            border-color: var(--gold-bright); 
            opacity: 1; 
            box-shadow: 0 0 30px rgba(249, 226, 114, 0.4);
            background: linear-gradient(145deg, #1d3557, #0a192f);
        }

        .char-img-frame {
            width: 100%; aspect-ratio: 1/1; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.4);
            margin-bottom: 15px; overflow: hidden; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .char-img-frame img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { color: var(--gold-bright); font-weight: bold; font-size: 1.3rem; }

        /* 自我介紹文字框 */
        #char-intro-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border-left: 4px solid var(--gold-bright);
            width: 100%;
            min-height: 80px;
            display: none;
            text-align: left;
            animation: slideIn 0.4s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* 確認按鈕專屬樣式 */
        #confirm-char-btn {
            display: none;
            margin-top: 20px;
            animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn { 
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. 模式按鈕 */
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-bottom: 25px; }
        .mode-btn {
            padding: 20px 10px; border-radius: 20px; border: 3px solid rgba(212, 175, 55, 0.2);
            background: rgba(17, 34, 64, 0.7); color: var(--text-dim); cursor: pointer;
            font-weight: bold; font-size: 1.3rem; display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: all 0.3s;
        }
        .mode-btn span:first-child { font-size: 2.2rem; }
        .mode-btn.active#btn-study { border-color: var(--gold-main); color: var(--gold-bright); background: #2c1f0a; box-shadow: 0 0 20px var(--gold-main); }
        .mode-btn.active#btn-quiz { border-color: var(--accent-blue); color: #74b9ff; background: #0a1f3d; box-shadow: 0 0 20px var(--accent-blue); }

        /* 3. 勇者面板 */
        .hero-bar {
            width: 100%; display: flex; align-items: center; background: rgba(10, 25, 47, 0.9);
            padding: 15px; border-radius: 25px; border: 2px solid var(--gold-main); margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        .hero-img-box { width: 65px; height: 65px; border-radius: 12px; border: 2px solid var(--gold-bright); overflow: hidden; margin-right: 15px; background: #000; }
        .hero-img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 4. 控制區 */
        .control-panel {
            width: 100%; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px;
            margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .speed-row { display: flex; gap: 10px; align-items: center; font-weight: bold; color: var(--gold-main); font-size: 0.9rem; }
        .category-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

        .small-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--text-dim);
            padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; transition: 0.3s;
        }
        .small-btn.active { border-color: var(--gold-bright); color: var(--gold-bright); background: rgba(212, 175, 55, 0.2); font-weight: bold; }

        /* 5. 單字卡與測驗區 */
        .card-wrap { width: 100%; height: 350px; perspective: 1200px; cursor: pointer; margin-bottom: 25px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
        .card-side { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 30px; border: 2px solid var(--gold-main); padding: 30px; 
            background-color: var(--bg-surface); box-shadow: var(--shadow);
        }
        .card-front .word { font-size: 3.5rem; color: var(--gold-bright); text-align: center; }
        .card-front .trans { font-size: 1.8rem; color: var(--gold-main); margin-top: 15px; }
        .card-back { transform: rotateY(180deg); background: linear-gradient(145deg, #1a2a44, #0a192f); text-align: center; }

        .quiz-area { display: none; width: 100%; background: var(--bg-surface); padding: 30px 20px; border-radius: 30px; border: 2px solid var(--gold-main); text-align: center; margin-bottom: 25px; box-shadow: var(--shadow); }
        .quiz-q { font-size: 1.4rem; margin-bottom: 25px; min-height: 5rem; display: flex; align-items: center; justify-content: center; line-height: 1.5; color: white; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: #162a4a; border: 1px solid var(--gold-main); color: white; padding: 18px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; font-weight: bold; }
        .opt-btn:hover { background: #1f3a63; border-color: var(--gold-bright); }

        .game-btn { 
            background: linear-gradient(to bottom, var(--gold-bright), var(--gold-main)); 
            color: var(--bg-deep); padding: 15px 40px; border-radius: 40px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 1.2rem; 
            box-shadow: 0 8px 20px rgba(212,175,55,0.4); transition: 0.3s;
        }
        .game-btn:hover { transform: scale(1.05); }

        @media (max-width: 480px) { .opt-grid { grid-template-columns: 1fr; } .mode-btn { font-size: 1.1rem; } }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <!-- 0. 開場引導 -->
    <div id="welcome-overlay" class="modal-overlay">
        <div class="welcome-box">
            <div class="modal-content">
                <h2 style="color:var(--gold-bright); font-size:2rem; margin-bottom:15px;">勇者召喚</h2>
                <div style="font-size: 4rem; margin-bottom: 20px;">🛡️</div>
                <p style="margin-bottom:30px; font-size:1.2rem; line-height:1.6;">
                    請選擇一位導師作為夥伴，<br>展開冒險之旅！
                </p>
                <button class="game-btn" style="margin: 0 auto;" onclick="closeOverlay('welcome-overlay', 'scr-select')">踏入傳送門</button>
            </div>
        </div>
    </div>

    <!-- 1. 角色選擇畫面 -->
    <div id="scr-select" class="screen">
        <h1 style="color:var(--gold-main); font-size:2.8rem; margin: 20px 0; text-align:center;">GEPT 大冒險</h1>
        <p style="color:var(--gold-main); opacity:0.8; text-align:center; margin-bottom:10px;">— 點擊選擇導師 —</p>
        
        <div class="char-grid">
            <div id="char-male" class="char-card" onclick="selectCharacter('male')">
                <div class="char-img-frame"><img src="char1.png" onerror="this.parentElement.innerHTML='👨‍🏫'"></div>
                <div class="char-name">凱文 (Kevin)</div>
            </div>
            <div id="char-female" class="char-card" onclick="selectCharacter('female')">
                <div class="char-img-frame"><img src="char2.png" onerror="this.parentElement.innerHTML='👩‍🏫'"></div>
                <div class="char-name">艾莉絲 (Alice)</div>
            </div>
        </div>

        <!-- 角色自我介紹區 -->
        <div id="char-intro-box">
            <div style="color: var(--gold-bright); font-weight: bold; margin-bottom: 5px;" id="intro-name">導師名</div>
            <div style="font-size: 0.95rem; color: var(--text-light);" id="intro-text">打招呼內容...</div>
        </div>

        <!-- 確認按鈕 -->
        <button id="confirm-char-btn" class="game-btn" onclick="proceedToModeSelection()">
            ✨ 確認選擇，開始冒險！
        </button>
    </div>

    <!-- 1.5 模式選擇 -->
    <div id="modal-mode-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="hero-welcome-msg" style="color:var(--gold-bright); margin-bottom:15px;">你好！</h2>
            <p style="margin-bottom:25px; font-size:1.2rem;">冒險即將啟程，你想如何開始？</p>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <button class="game-btn" onclick="finalizeMode('study')">🔍 探索學習 (翻卡)</button>
                <button class="game-btn" style="background: linear-gradient(to bottom, #4A90E2, #357ABD); color: white;" onclick="finalizeMode('quiz')">⚔️ 首領挑戰 (測驗)</button>
            </div>
        </div>
    </div>

    <!-- 1.6 主題指引 -->
    <div id="modal-theme-guide" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div style="font-size:3.5rem; margin-bottom:15px;">🗺️</div>
            <h2 style="color:var(--gold-bright); margin-bottom:10px;">地圖導引</h2>
            <p style="font-size:1.1rem;">請先點擊上方的「主題按鈕」<br>選擇你要挑戰的範圍！</p>
            <button class="game-btn" style="margin-top:20px; margin-left: auto; margin-right: auto;" onclick="closeOverlay('modal-theme-guide', 'scr-game')">接收指令</button>
        </div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="scr-game" class="screen">
        <div class="hero-bar">
            <div class="hero-img-box"><img id="hero-img" src="" alt="Hero"></div>
            <div style="flex:1">
                <h2 id="hero-name" style="font-size:1.2rem; color:var(--gold-bright);">角色名稱</h2>
                <div style="font-size:0.75rem; color:var(--gold-main); margin-bottom:5px;">等級：LV.1 單字勇者</div>
                <div style="width:100%; height:8px; background:rgba(0,0,0,0.5); border-radius:4px; border: 1px solid var(--gold-main); overflow:hidden;">
                    <div style="width:35%; height:100%; background: linear-gradient(90deg, var(--gold-main), var(--gold-bright));"></div>
                </div>
            </div>
            <button style="color:var(--text-dim); background:transparent; border:none; text-decoration:underline; cursor:pointer; font-size:0.8rem; margin-left:10px;" onclick="location.reload()">更換角色</button>
        </div>

        <div class="mode-selector">
            <button id="btn-study" class="mode-btn" onclick="setMode('study')"><span>🔍</span><span>探索學習</span></button>
            <button id="btn-quiz" class="mode-btn" onclick="setMode('quiz')"><span>⚔️</span><span>首領挑戰</span></button>
        </div>

        <div class="control-panel">
            <div class="speed-row">
                <span>🗣️ 語速：</span>
                <button class="small-btn" id="rate-0.6" onclick="setSpeed(0.6)">慢速</button>
                <button class="small-btn active" id="rate-1.0" onclick="setSpeed(1.0)">普通</button>
                <button class="small-btn" id="rate-1.4" onclick="setSpeed(1.4)">快速</button>
            </div>
            <div class="category-row" id="cat-box"></div>
        </div>

        <!-- 學習卡片 -->
        <div id="card-widget" class="card-wrap" onclick="handleFlip()">
            <div class="card-inner">
                <div class="card-side card-front">
                    <div class="word" id="word-en">Select Topic</div>
                    <div class="trans" id="word-zh">請點選主題</div>
                </div>
                <div class="card-side card-back">
                    <div id="sent-en" style="color:white; font-size:1.4rem; line-height:1.5; margin-bottom:15px; text-align:center;">...</div>
                    <div id="sent-zh" style="color:var(--gold-bright); font-size:1.1rem;">...</div>
                </div>
            </div>
        </div>

        <!-- 測驗區域 -->
        <div id="quiz-widget" class="quiz-area">
            <div id="quiz-msg" style="height:24px; font-weight:bold; margin-bottom:10px;"></div>
            <div class="quiz-q" id="quiz-q-text">請選擇主題開始</div>
            <div class="opt-grid" id="opt-grid"></div>
        </div>

        <div class="category-row" style="margin-top:10px;">
            <button class="small-btn" onclick="changeIdx(-1)">❮ 上一個</button>
            <button class="game-btn" style="padding:10px 30px;" onclick="replayAudio(event)">🔊 聽發音</button>
            <button class="small-btn" onclick="changeIdx(1)">❯ 下一個</button>
        </div>
    </div>

    <script>
        const dataSet = {
            "日常社交": [
                { en: "Confident", zh: "有信心的", sent: "Be {word} when you speak English.", trans: "說英文時要有信心。" },
                { en: "Generous", zh: "慷慨的", sent: "He is {word} and often helps others.", trans: "他很大方且常幫助他人。" }
            ],
            "心情感受": [
                { en: "Patient", zh: "有耐心的", sent: "A good teacher is always {word}.", trans: "好老師總是非常有耐心。" },
                { en: "Nervous", zh: "緊張的", sent: "I always feel {word} before exams.", trans: "考試前我總是感到緊張。" }
            ],
            "美食地圖": [
                { en: "Delicious", zh: "美味的", sent: "This cake smells {word}!", trans: "這蛋糕聞起來真美味！" },
                { en: "Menu", zh: "菜單", sent: "May I see the {word}, please?", trans: "可以請給我看菜單嗎？" }
            ],
            "交通對談": [
                { en: "Transfer", zh: "轉乘", sent: "You need to {word} at the next stop.", trans: "你需要在下一站轉乘。" },
                { en: "Ticket", zh: "票", sent: "Show your {word} to the conductor.", trans: "向列車長出示你的票。" }
            ]
        };

        const charIntros = {
            male: {
                name: "凱文 (Kevin)",
                text: "哈囉！我是凱文。我將用智慧引領你探索英文世界，讓我們一起紮實學習！",
                voice: "Hello! I am Kevin. I will guide you through the English world with wisdom."
            },
            female: {
                name: "艾莉絲 (Alice)",
                text: "嗨！我是艾莉絲。讓我們展開有趣的冒險並學習新單字吧，準備好出發了嗎？",
                voice: "Hi! I am Alice. Let's have a fun adventure and learn new words!"
            }
        };

        let state = { hero: null, mode: 'study', cat: '日常社交', idx: 0, speed: 1.0, selectedType: null };

        // --- 核心優化：更強大的性別語音過濾 ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = state.speed;

                // 獲取當前應用的性別類型
                const targetGender = state.hero ? state.hero.gender : (state.selectedType || 'male');
                const voices = window.speechSynthesis.getVoices();
                let selectedVoice = null;

                const maleKeywords = ['male', 'david', 'mark', 'guy', 'google us english', 'andrew'];
                const femaleKeywords = ['female', 'zira', 'samantha', 'catherine', 'google us english', 'linda', 'hazel'];

                if (targetGender === 'male') {
                    // 尋找凱文的男生聲音
                    selectedVoice = voices.find(v => v.lang.startsWith('en') && 
                        maleKeywords.some(keyword => v.name.toLowerCase().includes(keyword)) &&
                        !v.name.toLowerCase().includes('female')); // 排除標示為女聲的
                } else {
                    // 尋找艾莉絲的女生聲音
                    selectedVoice = voices.find(v => v.lang.startsWith('en') && 
                        femaleKeywords.some(keyword => v.name.toLowerCase().includes(keyword)) &&
                        !v.name.toLowerCase().includes('male')); // 排除標示為男聲的
                }

                // 兜底方案：如果沒找到特定性別，選第一個英文語音
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.startsWith('en'));
                
                if (selectedVoice) u.voice = selectedVoice;
                window.speechSynthesis.speak(u);
            }
        }

        // 確保語音庫已載入
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        window.onload = () => { window.speechSynthesis.getVoices(); };

        function closeOverlay(overlayId, nextScreenId) {
            const overlay = document.getElementById(overlayId);
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            setTimeout(() => {
                overlay.style.display = 'none';
                if (nextScreenId) {
                    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                    document.getElementById(nextScreenId).classList.add('active');
                }
            }, 400);
        }

        function selectCharacter(type) {
            state.selectedType = type;
            document.getElementById('char-male').classList.toggle('selected', type === 'male');
            document.getElementById('char-female').classList.toggle('selected', type === 'female');
            
            const introBox = document.getElementById('char-intro-box');
            introBox.style.display = 'block';
            document.getElementById('intro-name').innerText = charIntros[type].name;
            document.getElementById('intro-text').innerText = charIntros[type].text;
            
            // 播放性別對應的招呼語
            speak(charIntros[type].voice);
            document.getElementById('confirm-char-btn').style.display = 'block';
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function proceedToModeSelection() {
            if (!state.selectedType) return;
            const type = state.selectedType;
            state.hero = type === 'male' ? 
                { name: "勇者 凱文", img: "char1.png", gender: 'male' } : 
                { name: "勇者 艾莉絲", img: "char2.png", gender: 'female' };
            
            document.getElementById('hero-welcome-msg').innerText = `你好，${state.hero.name}！`;
            document.getElementById('scr-select').classList.remove('active');
            document.getElementById('modal-mode-overlay').style.display = 'flex';
        }

        function finalizeMode(m) {
            state.mode = m;
            document.getElementById('modal-mode-overlay').style.display = 'none';
            document.getElementById('modal-mode-overlay').style.pointerEvents = 'none';
            document.getElementById('hero-img').src = state.hero.img;
            document.getElementById('hero-name').innerText = state.hero.name;
            document.getElementById('scr-game').classList.add('active');
            document.getElementById('modal-theme-guide').style.display = 'flex'; 
            setMode(m); initUI();
        }

        function setSpeed(val) {
            state.speed = val;
            document.querySelectorAll('.speed-row .small-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`rate-${val.toFixed(1)}`).classList.add('active');
            speak(dataSet[state.cat][state.idx].en);
        }

        function initUI() {
            const box = document.getElementById('cat-box'); box.innerHTML = '';
            Object.keys(dataSet).forEach(c => {
                const b = document.createElement('button');
                b.className = `small-btn ${c === state.cat ? 'active' : ''}`; b.innerText = c;
                b.onclick = () => { state.cat = c; state.idx = 0; initUI(); refresh(); };
                box.appendChild(b);
            });
            refresh();
        }

        function refresh() {
            const list = dataSet[state.cat];
            const item = list[state.idx];
            document.getElementById('word-en').innerText = item.en;
            document.getElementById('word-zh').innerText = item.zh;
            document.getElementById('sent-en').innerText = item.sent.replace('{word}', item.en);
            document.getElementById('sent-zh').innerText = item.trans;

            if(state.mode === 'quiz') genQuiz(item.en);
            document.getElementById('card-widget').classList.remove('flipped');
        }

        function handleFlip() {
            if(state.mode === 'quiz') return;
            const toBack = !document.getElementById('card-widget').classList.contains('flipped');
            const item = dataSet[state.cat][state.idx];
            speak(toBack ? item.sent.replace('{word}', item.en) : item.en);
            document.getElementById('card-widget').classList.toggle('flipped');
        }

        function replayAudio(e) { e.stopPropagation(); speak(dataSet[state.cat][state.idx].en); }

        function genQuiz(correct) {
            const grid = document.getElementById('opt-grid'); grid.innerHTML = '';
            document.getElementById('quiz-q-text').innerText = dataSet[state.cat][state.idx].sent.replace('{word}', '______');
            const cleanCorrect = correct.trim();
            let pool = []; Object.values(dataSet).forEach(arr => pool.push(...arr.map(o => o.en.trim())));
            let opts = [cleanCorrect, ...pool.filter(w => w.toLowerCase() !== cleanCorrect.toLowerCase())]
                       .filter((v, i, a) => a.indexOf(v) === i)
                       .sort(() => Math.random() - 0.5).slice(0, 4);
            opts = opts.sort(() => Math.random() - 0.5);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    if(o.toLowerCase().trim() === cleanCorrect.toLowerCase()) {
                        b.style.background = 'var(--accent-success)';
                        startConfetti(); speak("Excellent!");
                        document.getElementById('quiz-msg').innerHTML = `<span style="color:var(--accent-success)">Excellent!</span>`;
                        setTimeout(() => { if(state.idx < dataSet[state.cat].length - 1) changeIdx(1); }, 1500);
                    } else {
                        b.style.background = 'var(--accent-fail)';
                        document.getElementById('quiz-msg').innerHTML = `<span style="color:var(--accent-fail)">Try again!</span>`;
                        speak("Try again!");
                    }
                };
                grid.appendChild(b);
            });
        }

        function setMode(m) {
            state.mode = m;
            document.getElementById('btn-study').classList.toggle('active', m === 'study');
            document.getElementById('btn-quiz').classList.toggle('active', m === 'quiz');
            document.getElementById('card-widget').style.display = m === 'quiz' ? 'none' : 'block';
            document.getElementById('quiz-widget').style.display = m === 'quiz' ? 'block' : 'none';
            refresh();
        }

        function changeIdx(dir) {
            let list = dataSet[state.cat];
            state.idx = (state.idx + dir + list.length) % list.length;
            refresh();
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class P {
            constructor() {
                this.x = canvas.width/2; this.y = canvas.height/2;
                this.s = Math.random()*5+3; this.c = `hsl(${Math.random()*360},100%,50%)`;
                this.a = Math.random()*Math.PI*2; this.sp = Math.random()*10+5; this.o = 1;
            }
            u() { this.x += Math.cos(this.a)*this.sp; this.y += Math.sin(this.a)*this.sp+1; this.o -= 0.02; }
            d() { ctx.globalAlpha = this.o; ctx.fillStyle = this.c; ctx.fillRect(this.x, this.y, this.s, this.s); }
        }
        function startConfetti() {
            pts = Array.from({length: 40}, () => new P());
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                pts.forEach((p,i) => { p.u(); p.d(); if(p.o <= 0) pts.splice(i,1); });
                if(pts.length > 0) requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
